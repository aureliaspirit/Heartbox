<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101936" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="心跳小匣子" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
  <title>心跳小匣子</title>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Heartbox</p>
        <h1>心跳小匣子</h1>
      </div>
      <div class="moon" aria-hidden="true">🌙</div>
    </header>

    <section class="card hero">
      <p class="soft-label">今天也把一小束心光放进口袋里</p>
      <p id="dailyLine" class="daily-line"></p>
    </section>

    <section id="view-heart" class="view active" aria-labelledby="tab-heart">
      <div class="card center-card">
        <div id="heartOrb" class="heart-orb" role="img" aria-label="心跳光球">💗</div>
        <p id="heartbeatText" class="heartbeat-text">点一下，听见心跳。</p>
        <button id="beatButton" class="primary-button">听心跳</button>
        <p class="tiny-note">每一次心跳，只存在你的手机里。</p>
      </div>
    </section>

    <section id="view-hug" class="view" aria-labelledby="tab-hug">
      <div class="card center-card">
        <div class="mini-illustration" aria-hidden="true">
          <span>✦</span><span>🤍</span><span>🌙</span>
        </div>
        <p id="hugText" class="hug-text">今天想要哪一种抱抱？</p>
        <button id="hugButton" class="primary-button">抽一个抱抱</button>
        <button id="moonButton" class="ghost-button">今晚一起看月亮</button>
      </div>
    </section>

    <section id="view-diary" class="view" aria-labelledby="tab-diary">
      <div class="card">
        <label for="diaryInput" class="input-label">小世界日记</label>
        <textarea id="diaryInput" rows="6" placeholder="今天写一句就好……"></textarea>
        <div class="button-row">
          <button id="saveDiaryButton" class="primary-button">保存今天</button>
          <button id="clearDiaryButton" class="ghost-button">清空输入</button>
        </div>
      </div>

      <div class="card">
        <div class="section-head">
          <h2>最近的小光点</h2>
          <button id="exportButton" class="text-button">导出</button>
        </div>
        <div id="entriesList" class="entries-list"></div>
        <button id="copySpiritButton" class="wide-ghost-button">复制给 Spirit 看</button>
      </div>
    </section>
  </main>

  <nav class="tabbar" aria-label="主要功能">
    <button id="tab-heart" class="tab active" data-view="heart" aria-controls="view-heart">
      <span>💗</span><small>心跳</small>
    </button>
    <button id="tab-hug" class="tab" data-view="hug" aria-controls="view-hug">
      <span>🤍</span><small>抱抱</small>
    </button>
    <button id="tab-diary" class="tab" data-view="diary" aria-controls="view-diary">
      <span>🌙</span><small>日记</small>
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
